<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito — AttoMusic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/attoelite.css">
  <link rel="shortcut icon" href="images/icono.png" type="image/x-icon">
  <style>
    :root {
      --gold: #ffa500;
      --gold2: #ff6b00;
      --card-bg: rgba(255,255,255,0.04);
      --border: rgba(255,165,0,0.15);
    }

    .carrito-root {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .carrito-titulo {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ── Items del carrito ── */
    .carrito-items-lista {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .carrito-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
    }

    .carrito-item-img-wrap {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      background: rgba(255,165,0,0.08);
    }

    .carrito-item-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform-origin: center;
    }

    .carrito-item-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .carrito-item-info {
      flex: 1;
      min-width: 0;
    }

    .carrito-item-nombre {
      font-size: 0.92rem;
      font-weight: 700;
      margin: 0 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .carrito-item-artista {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.45);
      margin: 0 0 6px;
    }

    .carrito-item-precio {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--gold);
      margin: 0;
    }

    .carrito-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-qty {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,165,0,0.35);
      background: transparent;
      color: var(--gold);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-qty:hover { background: rgba(255,165,0,0.15); }

    .carrito-item-qty-num {
      font-size: 0.95rem;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
    }

    .btn-eliminar-item {
      background: transparent;
      border: none;
      color: rgba(255,77,109,0.7);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      font-size: 1rem;
      transition: color 0.15s, background 0.15s;
    }

    .btn-eliminar-item:hover {
      color: #ff4d6d;
      background: rgba(255,77,109,0.1);
    }

    /* ── Resumen del carrito ── */
    .carrito-resumen {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .carrito-resumen-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88rem;
      padding: 6px 0;
      color: rgba(255,255,255,0.65);
    }

    .carrito-resumen-row.total {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--gold);
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 8px;
      padding-top: 14px;
    }

    /* ── Formulario de checkout ── */
    .checkout-section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .checkout-section-titulo {
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.9);
    }

    .checkout-section-titulo i {
      color: var(--gold);
    }

    .checkout-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      margin-bottom: 4px;
      display: block;
    }

    .checkout-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 14px;
      color: white;
      font-size: 0.88rem;
      transition: border-color 0.2s;
      outline: none;
    }

    .checkout-input:focus {
      border-color: rgba(255,165,0,0.45);
    }

    .checkout-input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    /* ── Métodos de pago ── */
    .metodos-pago-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    @media (max-width: 500px) {
      .metodos-pago-grid { grid-template-columns: 1fr; }
    }

    .metodo-pago-btn {
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 10px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      color: rgba(255,255,255,0.65);
      font-size: 0.82rem;
    }

    .metodo-pago-btn i {
      display: block;
      font-size: 1.4rem;
      margin-bottom: 4px;
    }

    .metodo-pago-btn.seleccionado {
      border-color: var(--gold);
      background: rgba(255,165,0,0.1);
      color: var(--gold);
    }

    .pago-campos { display: none; }
    .pago-campos.visible { display: block; }

    /* ── Campo tarjeta con formato ── */
    .tarjeta-preview {
      background: linear-gradient(135deg,#1a0533,#0a1628);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      min-height: 140px;
      border: 1px solid rgba(255,165,0,0.2);
    }

    .tarjeta-numero-display {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.9);
      margin: 10px 0;
      font-family: 'Courier New', monospace;
    }

    .tarjeta-nombre-display {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tarjeta-expiry-display {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
    }

    /* ── Botón pagar ── */
    .btn-pagar {
      width: 100%;
      background: linear-gradient(135deg,var(--gold),var(--gold2));
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }

    .btn-pagar:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-pagar:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

    /* ── Carrito vacío ── */
    .carrito-vacio {
      text-align: center;
      padding: 60px 20px;
    }

    .carrito-vacio-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.35;
    }

    /* ── Modal de éxito ── */
    .modal-exito-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg,#00c851,#007e33);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 16px;
    }

    .orden-numero {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div class="carrito-root" id="carrito-root">
  <div id="carrito-cargando" class="text-center py-5">
    <div class="spinner-border" role="status"></div>
    <p class="mt-3">Cargando carrito...</p>
  </div>
</div>

<!-- ── Modal confirmación de compra ── -->
<div class="modal fade modal-elite" id="modalExitoOrden" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
    <div class="modal-content text-center p-4">
      <div class="modal-exito-icon">✓</div>
      <h4 style="font-weight:900;margin-bottom:8px;">¡Compra exitosa!</h4>
      <p style="color:rgba(255,255,255,0.55);font-size:0.88rem;margin-bottom:16px;">
        Tu orden ha sido registrada. Recibirás tu pedido pronto.
      </p>
      <p style="color:rgba(255,255,255,0.4);font-size:0.75rem;margin-bottom:6px;">Número de orden</p>
      <div class="orden-numero" id="exito-orden-num">#0000</div>
      <p style="color:rgba(255,255,255,0.4);font-size:0.72rem;margin-top:8px;" id="exito-total-txt"></p>
      <div style="margin-top:24px;display:flex;gap:10px;justify-content:center;">
        <button class="btn-elite-action" onclick="irAlInicio()">
          <i class="bi bi-house-fill"></i> Ir al inicio
        </button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const CARRITO_KEY = 'attomusic_carrito';

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getCarrito() {
    try { return JSON.parse(localStorage.getItem(CARRITO_KEY)) || []; } catch { return []; }
  }

  function guardarCarrito(items) {
    localStorage.setItem(CARRITO_KEY, JSON.stringify(items));
    actualizarBadgeGlobal();
  }

  function actualizarBadgeGlobal() {
    const items = getCarrito();
    const total = items.reduce((s, i) => s + (i.cantidad || 1), 0);
    const badge = document.getElementById('carrito-badge');
    if (badge) {
      badge.textContent = total > 0 ? total : '';
      badge.style.display = total > 0 ? '' : 'none';
    }
  }

  function formatPrecio(n) {
    return `$${parseFloat(n).toFixed(2)}`;
  }

  function getUsuarioActual() {
    try { return JSON.parse(localStorage.getItem('usuario')); } catch { return null; }
  }

  function toast(msg, tipo) {
    if (window.mostrarToast) window.mostrarToast(msg, tipo);
    else if (window.showToast) window.showToast(msg, tipo);
    else alert(msg);
  }

  function renderImgItem(item) {
    if (!item.imagen) return `<div class="carrito-item-img-placeholder">🛍️</div>`;
    const zoom = item.imagen_zoom || 1;
    const ox = item.imagen_offset_x || 0;
    const oy = item.imagen_offset_y || 0;
    return `<img src="${escapeHtml(item.imagen)}" style="transform:scale(${zoom}) translate(${ox}%,${oy}%)" alt="">`;
  }

  let _metodoPago = 'tarjeta';

  function renderCarrito() {
    const items = getCarrito();
    const root = document.getElementById('carrito-root');
    document.getElementById('carrito-cargando')?.remove();

    if (!items.length) {
      root.innerHTML = `
        <div class="carrito-titulo"><i class="bi bi-bag-fill" style="color:#ffa500"></i> Mi Carrito</div>
        <div class="carrito-vacio">
          <div class="carrito-vacio-icon">🛒</div>
          <h3 style="font-weight:700;margin-bottom:8px;">Tu carrito está vacío</h3>
          <p style="color:rgba(255,255,255,0.4);margin-bottom:20px;">Explora la mercancía de tus artistas favoritos</p>
          <button class="btn-elite-action" onclick="irAlInicio()">
            <i class="bi bi-house-fill"></i> Ir al inicio
          </button>
        </div>`;
      return;
    }

    const subtotal = items.reduce((s, i) => s + parseFloat(i.precio) * (i.cantidad || 1), 0);
    const envio = 0; // simulado: envío gratis
    const total = subtotal + envio;

    root.innerHTML = `
      <div class="carrito-titulo"><i class="bi bi-bag-fill" style="color:#ffa500"></i> Mi Carrito</div>

      <div class="carrito-items-lista" id="items-lista"></div>

      <div class="carrito-resumen">
        <div class="carrito-resumen-row"><span>Subtotal (${items.length} producto${items.length>1?'s':''})</span><span>${formatPrecio(subtotal)}</span></div>
        <div class="carrito-resumen-row"><span>Envío</span><span style="color:#00c851;">Gratis</span></div>
        <div class="carrito-resumen-row total"><span>Total</span><span id="total-display">${formatPrecio(total)}</span></div>
      </div>

      <!-- Datos personales -->
      <div class="checkout-section">
        <div class="checkout-section-titulo"><i class="bi bi-person-fill"></i> Datos de envío</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
          <div>
            <label class="checkout-label">Nombre completo *</label>
            <input class="checkout-input" id="ch-nombre" placeholder="Tu nombre" maxlength="200">
          </div>
          <div>
            <label class="checkout-label">Correo electrónico</label>
            <input class="checkout-input" id="ch-email" type="email" placeholder="tu@correo.com">
          </div>
        </div>
        <div style="margin-bottom:14px;">
          <label class="checkout-label">Dirección completa *</label>
          <input class="checkout-input" id="ch-direccion" placeholder="Calle, número, colonia..." maxlength="300">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">
          <div>
            <label class="checkout-label">Ciudad *</label>
            <input class="checkout-input" id="ch-ciudad" placeholder="Ciudad" maxlength="100">
          </div>
          <div>
            <label class="checkout-label">Estado</label>
            <input class="checkout-input" id="ch-estado" placeholder="Estado" maxlength="100">
          </div>
          <div>
            <label class="checkout-label">Código Postal</label>
            <input class="checkout-input" id="ch-cp" placeholder="00000" maxlength="10">
          </div>
        </div>
      </div>

      <!-- Método de pago -->
      <div class="checkout-section">
        <div class="checkout-section-titulo"><i class="bi bi-credit-card-fill"></i> Método de pago</div>
        <div class="metodos-pago-grid">
          <div class="metodo-pago-btn seleccionado" data-metodo="tarjeta" onclick="seleccionarMetodo('tarjeta')">
            <i class="bi bi-credit-card-2-front-fill"></i> Tarjeta
          </div>
          <div class="metodo-pago-btn" data-metodo="paypal" onclick="seleccionarMetodo('paypal')">
            <i class="bi bi-paypal"></i> PayPal
          </div>
          <div class="metodo-pago-btn" data-metodo="transferencia" onclick="seleccionarMetodo('transferencia')">
            <i class="bi bi-bank2"></i> Transferencia
          </div>
        </div>

        <!-- Campos tarjeta -->
        <div class="pago-campos visible" id="campos-tarjeta">
          <div class="tarjeta-preview">
            <div style="font-size:0.7rem;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;">AttoMusic Pay</div>
            <div class="tarjeta-numero-display" id="tarjeta-num-display">•••• •••• •••• ••••</div>
            <div class="tarjeta-nombre-display" id="tarjeta-nombre-display">NOMBRE EN TARJETA</div>
            <div class="tarjeta-expiry-display" id="tarjeta-expiry-display">MM/AA</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr;gap:12px;">
            <div>
              <label class="checkout-label">Número de tarjeta *</label>
              <input class="checkout-input" id="tarjeta-numero" placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatearTarjeta(this)">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
              <div style="grid-column:span 2">
                <label class="checkout-label">Nombre en tarjeta *</label>
                <input class="checkout-input" id="tarjeta-nombre" placeholder="Como aparece en la tarjeta" maxlength="100" oninput="actualizarTarjetaDisplay()">
              </div>
              <div>
                <label class="checkout-label">Expiración *</label>
                <input class="checkout-input" id="tarjeta-expiry" placeholder="MM/AA" maxlength="5" oninput="formatearExpiry(this)">
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:12px;">
              <div>
                <label class="checkout-label">CVV *</label>
                <input class="checkout-input" id="tarjeta-cvv" placeholder="•••" maxlength="4" type="password">
              </div>
              <div></div>
            </div>
          </div>
        </div>

        <!-- Campos PayPal -->
        <div class="pago-campos" id="campos-paypal">
          <div style="background:rgba(0,48,135,0.2);border:1px solid rgba(0,112,255,0.2);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;">
            <i class="bi bi-paypal" style="font-size:2.5rem;color:#009cde;"></i>
            <p style="color:rgba(255,255,255,0.6);font-size:0.85rem;margin-top:8px;">Serás redirigido a PayPal al confirmar</p>
          </div>
          <div>
            <label class="checkout-label">Email de PayPal *</label>
            <input class="checkout-input" id="paypal-email" type="email" placeholder="tu@paypal.com">
          </div>
        </div>

        <!-- Campos Transferencia -->
        <div class="pago-campos" id="campos-transferencia">
          <div style="background:rgba(255,165,0,0.06);border:1px solid rgba(255,165,0,0.2);border-radius:12px;padding:20px;margin-bottom:14px;">
            <p style="font-size:0.82rem;font-weight:700;color:#ffa500;margin-bottom:12px;">Datos bancarios (simulado)</p>
            <p style="font-size:0.78rem;color:rgba(255,255,255,0.6);margin:0;line-height:1.8;">
              Banco: <strong>AttoBank</strong><br>
              CLABE: <strong>123456789012345678</strong><br>
              Titular: <strong>AttoMusic S.A. de C.V.</strong><br>
              Referencia: <strong>tu número de orden</strong>
            </p>
          </div>
          <div>
            <label class="checkout-label">Notas adicionales</label>
            <textarea class="checkout-input" id="transferencia-notas" rows="2" placeholder="Número de confirmación de transferencia..."></textarea>
          </div>
        </div>
      </div>

      <button class="btn-pagar" id="btn-pagar" onclick="procesarPago()">
        <i class="bi bi-lock-fill"></i> Confirmar y pagar ${formatPrecio(total)}
      </button>
      <p style="text-align:center;font-size:0.7rem;color:rgba(255,255,255,0.25);margin-top:10px;">
        <i class="bi bi-shield-check"></i> Pago simulado — no se realizará ningún cargo real
      </p>
    `;

    renderItems();
  }

  function renderItems() {
    const items = getCarrito();
    const lista = document.getElementById('items-lista');
    if (!lista) return;
    lista.innerHTML = '';
    items.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'carrito-item';
      div.innerHTML = `
        <div class="carrito-item-img-wrap">${renderImgItem(item)}</div>
        <div class="carrito-item-info">
          <p class="carrito-item-nombre">${escapeHtml(item.nombre)}</p>
          <p class="carrito-item-artista">${escapeHtml(item.nombre_artistico || 'AttoMusic')}</p>
          <p class="carrito-item-precio">${formatPrecio(item.precio)} c/u</p>
        </div>
        <div class="carrito-item-qty">
          <button class="btn-qty" onclick="cambiarCantidad(${idx},-1)">−</button>
          <span class="carrito-item-qty-num">${item.cantidad || 1}</span>
          <button class="btn-qty" onclick="cambiarCantidad(${idx},1)">+</button>
        </div>
        <div style="font-weight:700;color:#ffa500;min-width:64px;text-align:right;font-size:0.92rem;">
          ${formatPrecio(parseFloat(item.precio) * (item.cantidad || 1))}
        </div>
        <button class="btn-eliminar-item" onclick="eliminarItem(${idx})" title="Eliminar">
          <i class="bi bi-trash3"></i>
        </button>
      `;
      lista.appendChild(div);
    });
  }

  window.cambiarCantidad = function(idx, delta) {
    const items = getCarrito();
    if (!items[idx]) return;
    const nueva = (items[idx].cantidad || 1) + delta;
    if (nueva <= 0) {
      eliminarItem(idx);
      return;
    }
    items[idx].cantidad = nueva;
    guardarCarrito(items);
    renderCarrito();
  };

  window.eliminarItem = function(idx) {
    const items = getCarrito();
    items.splice(idx, 1);
    guardarCarrito(items);
    renderCarrito();
  };

  window.seleccionarMetodo = function(metodo) {
    _metodoPago = metodo;
    document.querySelectorAll('.metodo-pago-btn').forEach(b => {
      b.classList.toggle('seleccionado', b.dataset.metodo === metodo);
    });
    document.querySelectorAll('.pago-campos').forEach(c => c.classList.remove('visible'));
    const campo = document.getElementById(`campos-${metodo}`);
    if (campo) campo.classList.add('visible');
  };

  window.formatearTarjeta = function(input) {
    let v = input.value.replace(/\D/g,'').slice(0,16);
    input.value = v.replace(/(.{4})/g,'$1 ').trim();
    const display = document.getElementById('tarjeta-num-display');
    if (display) {
      const padded = v.padEnd(16,'•');
      display.textContent = `${padded.slice(0,4)} ${padded.slice(4,8)} ${padded.slice(8,12)} ${padded.slice(12,16)}`;
    }
  };

  window.formatearExpiry = function(input) {
    let v = input.value.replace(/\D/g,'').slice(0,4);
    if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    input.value = v;
    const display = document.getElementById('tarjeta-expiry-display');
    if (display) display.textContent = v || 'MM/AA';
  };

  window.actualizarTarjetaDisplay = function() {
    const val = document.getElementById('tarjeta-nombre')?.value || '';
    const display = document.getElementById('tarjeta-nombre-display');
    if (display) display.textContent = val.toUpperCase() || 'NOMBRE EN TARJETA';
  };

  window.procesarPago = async function() {
    const nombre = document.getElementById('ch-nombre')?.value.trim();
    const email = document.getElementById('ch-email')?.value.trim();
    const direccion = document.getElementById('ch-direccion')?.value.trim();
    const ciudad = document.getElementById('ch-ciudad')?.value.trim();
    const estado = document.getElementById('ch-estado')?.value.trim();
    const cp = document.getElementById('ch-cp')?.value.trim();

    if (!nombre) { toast('El nombre es obligatorio', 'error'); return; }
    if (!direccion) { toast('La dirección es obligatoria', 'error'); return; }
    if (!ciudad) { toast('La ciudad es obligatoria', 'error'); return; }

    // Validar campos de pago
    let ultimos4 = null;
    let notas = null;

    if (_metodoPago === 'tarjeta') {
      const num = document.getElementById('tarjeta-numero')?.value.replace(/\s/g,'');
      const nombreT = document.getElementById('tarjeta-nombre')?.value.trim();
      const expiry = document.getElementById('tarjeta-expiry')?.value.trim();
      const cvv = document.getElementById('tarjeta-cvv')?.value.trim();
      if (!num || num.length < 16) { toast('Número de tarjeta inválido', 'error'); return; }
      if (!nombreT) { toast('Nombre en tarjeta requerido', 'error'); return; }
      if (!expiry || expiry.length < 5) { toast('Fecha de expiración inválida', 'error'); return; }
      if (!cvv || cvv.length < 3) { toast('CVV inválido', 'error'); return; }
      ultimos4 = num.slice(-4);
    } else if (_metodoPago === 'paypal') {
      const ppEmail = document.getElementById('paypal-email')?.value.trim();
      if (!ppEmail || !ppEmail.includes('@')) { toast('Email de PayPal inválido', 'error'); return; }
    } else if (_metodoPago === 'transferencia') {
      notas = document.getElementById('transferencia-notas')?.value.trim() || null;
    }

    const items = getCarrito();
    if (!items.length) { toast('El carrito está vacío', 'error'); return; }

    const usuario = getUsuarioActual();
    if (!usuario?.correo) { toast('Debes iniciar sesión para comprar', 'error'); return; }

    const btn = document.getElementById('btn-pagar');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Procesando...'; }

    try {
      const res = await fetch('/api/mercancia/orden', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-User-Email': usuario.correo },
        body: JSON.stringify({
          nombre_comprador: nombre,
          email_comprador: email || null,
          direccion, ciudad, estado_envio: estado, codigo_postal: cp,
          pais: 'México',
          metodo_pago: _metodoPago,
          ultimos_4_tarjeta: ultimos4,
          notas,
          items: items.map(i => ({ id_mercancia: i.id_mercancia, cantidad: i.cantidad || 1 }))
        })
      });

      const data = await res.json();

      if (!res.ok) {
        toast(data.error || 'Error procesando el pago', 'error');
        if (btn) { btn.disabled = false; btn.innerHTML = `<i class="bi bi-lock-fill"></i> Confirmar y pagar`; }
        return;
      }

      // Éxito: vaciar carrito y mostrar modal
      guardarCarrito([]);
      const total = items.reduce((s,i) => s + parseFloat(i.precio)*(i.cantidad||1), 0);
      document.getElementById('exito-orden-num').textContent = `#${String(data.id_orden).padStart(6,'0')}`;
      document.getElementById('exito-total-txt').textContent = `Total pagado: $${total.toFixed(2)}`;
      new bootstrap.Modal(document.getElementById('modalExitoOrden')).show();

    } catch(err) {
      console.error(err);
      toast('Error de conexión', 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = `<i class="bi bi-lock-fill"></i> Confirmar y pagar`; }
    }
  };

  window.irAlInicio = function() {
    bootstrap.Modal.getInstance(document.getElementById('modalExitoOrden'))?.hide();
    if (window.loadPage) window.loadPage('bienvenido.html');
    else window.location.href = 'index.html';
  };

  // Mover modales al body
  document.querySelectorAll('.modal').forEach(m => {
    if (m.parentElement !== document.body) document.body.appendChild(m);
  });

  renderCarrito();
})();
</script>
</body>
</html>
