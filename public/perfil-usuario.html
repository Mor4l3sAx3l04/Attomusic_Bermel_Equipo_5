<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Usuario - AttoMusic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/canciones-artistas.css">
  <link rel="stylesheet" href="css/pages/perfil-usuario.css">
</head>

<body>

  <div class="perfil-header" id="headerFondo">
    <div class="container">
      <div class="d-flex align-items-center gap-4">
        <div id="perfilAvatar"></div>
        <div class="perfil-info flex-grow-1">
          <h2 id="perfilUsuario">Cargando...
            <span id="badge-vip-pub" class="badge-vip-small ms-2" style="display:none;"><i class="bi bi-crown-fill"></i> VIP</span>
            <span id="badge-artista-pub" class="badge-artista-small ms-1" style="display:none;"><i class="bi bi-music-note"></i> Artista</span>
          </h2>
          <p class="mb-0" id="perfilCorreo"></p>
          <small id="perfilFecha"></small>
          <div class="perfil-stats mt-3">
            <div class="stat-item"><span class="number" id="statSeguidores">0</span><span class="label">Seguidores</span></div>
            <div class="stat-item"><span class="number" id="statSeguidos">0</span><span class="label">Siguiendo</span></div>
            <div class="stat-item"><span class="number" id="statPublicaciones">0</span><span class="label">Publicaciones</span></div>
          </div>
        </div>
        <div id="btnSeguirContainer"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <!-- Tabs para perfiles con canciones -->
    <div id="tabs-pub-canciones" style="display:none;">
      <div class="perfil-tabs">
        <button class="perfil-tab active" id="tab-pub-pub" onclick="tabPerfilPublico('publicaciones')">
          <i class="bi bi-postcard"></i> Publicaciones
        </button>
        <button class="perfil-tab" id="tab-pub-can" onclick="tabPerfilPublico('canciones')">
          <i class="bi bi-vinyl"></i> Canciones
        </button>
      </div>
    </div>
    <h4 class="mb-4" id="titulo-pub-pub">Publicaciones</h4>
    <div id="publicacionesUsuario" class="publicaciones-usuario"></div>
    <div id="cancionesUsuarioPub" class="canciones-perfil-grid" style="display:none;"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/components/PublicacionCard.js"></script>
  <script src="js/pages/perfil-usuario.js"></script>
</body>

</html>
