<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Usuario - AttoMusic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages/perfil-usuario.css">
</head>

<body>

  <div class="perfil-header" id="headerFondo">
    <div class="container">
      <div class="d-flex align-items-center gap-4">
        <div id="perfilAvatar"></div>
        <div class="perfil-info flex-grow-1">
          <h2 id="perfilUsuario">Cargando...</h2>
          <p class="mb-0" id="perfilCorreo"></p>
          <small id="perfilFecha"></small>
          <div class="perfil-stats mt-3">
            <div class="stat-item"><span class="number" id="statSeguidores">0</span><span class="label">Seguidores</span></div>
            <div class="stat-item"><span class="number" id="statSeguidos">0</span><span class="label">Siguiendo</span></div>
            <div class="stat-item"><span class="number" id="statPublicaciones">0</span><span class="label">Publicaciones</span></div>
          </div>
        </div>
        <div id="btnSeguirContainer"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <h4 class="mb-4">Publicaciones</h4>
    <div id="publicacionesUsuario" class="publicaciones-usuario"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/components/PublicacionCard.js"></script>
  <script src="js/pages/perfil-usuario.js"></script>
</body>

</html>
