<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos - AttoMusic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/eventos.css">
</head>
<body>

  <div class="container py-4" style="max-width: 720px;">

    <div class="eventos-header fade-in">
      <div class="eventos-header-icon"><i class="bi bi-calendar-event-fill"></i></div>
      <h1>Eventos</h1>
      <p class="text-muted">Todos los eventos de los artistas de la comunidad</p>
    </div>

    <div id="eventos-container"></div>

    <div id="eventos-spinner" class="eventos-spinner" style="display:none;">
      <div class="spinner-border" style="color:#ba01ff;" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>

    <div id="eventos-vacio" style="display:none;text-align:center;padding:60px 20px;color:rgba(128,128,128,0.8);">
      <i class="bi bi-calendar-x" style="font-size:3rem;display:block;margin-bottom:12px;"></i>
      <p style="margin:0;font-size:1rem;">No hay eventos disponibles por el momento</p>
    </div>

    <div id="eventos-fin" class="eventos-fin" style="display:none;">
      <i class="bi bi-check-circle"></i> Has visto todos los eventos
    </div>

  </div>

<script src="js/pages/eventos-init.js"></script>
</body>
</html>
