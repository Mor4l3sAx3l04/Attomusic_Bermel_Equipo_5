<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AttoMusic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/welcome.css">
  <link rel="shortcut icon" href="images/icono.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

  <style>
    /* ── Lordicon: colores por defecto (modo claro) ── */
    lord-icon {
      --lord-icon-primary: #ba01ff;
      --lord-icon-secondary: #00dffc;
    }
    /* Modo oscuro */
    html[data-bs-theme="dark"] lord-icon,
    body[data-bs-theme="dark"] lord-icon {
      --lord-icon-primary: #d580ff;
      --lord-icon-secondary: #00dffc;
    }

    /* Ícono musical giratorio junto al título */
    .titulo-icon-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    /* Área del buscador con ícono animado */
    .buscador-lord-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .buscador-lord-icon .input-group {
      max-width: 520px;
      flex: 1;
    }
  </style>
</head>
<body>

  <!-- Script de Lordicon (se carga una sola vez gracias a la deduplicación de loadPage) -->
  <script src="https://cdn.lordicon.com/lordicon.js"></script>

  <div style="text-align: center;">

    <!-- ── HEADER CON ÍCONO ANIMADO ── -->
    <div class="news-header mb-5 fade-up-section text-center">

      <!-- Ícono de nota musical en loop sobre el título -->
      <!--
        Icon: Music Notes (wired/gradient)
        URL: https://lordicon.com/icons/wired/gradient/43-music-note
        Si el ícono no carga, ve a lordicon.com, busca el ícono deseado,
        haz clic en "Embed HTML" y copia la URL del atributo src.
      -->
      <lord-icon
        src="https://cdn.lordicon.com/slkvcobz.json"
        trigger="loop"
        delay="500"
        colors="primary:#ba01ff,secondary:#00dffc"
        style="width:72px;height:72px;margin-bottom:8px;">
      </lord-icon>

      <h1 id="titulo-noticias" style="font-size: 70px;"></h1>
      <p class="text-muted">Observa los gustos de la gente.</p>
    </div>

    <!-- ── BUSCADOR CON ÍCONO ANIMADO ── -->
    <div class="buscador-container mb-4">
      <div class="buscador-lord-icon">
        <!-- Ícono de lupa que anima al hover -->
        <!--
          Icon: Magnifier (wired/gradient)
          URL: https://lordicon.com/icons/wired/gradient/114-magnifier
        -->
        <lord-icon
          src="https://cdn.lordicon.com/msoeawqm.json"
          trigger="hover"
          colors="primary:#ba01ff,secondary:#00dffc"
          style="width:40px;height:40px;cursor:pointer;flex-shrink:0;"
          id="lordIconSearch">
        </lord-icon>

        <div class="input-group">
          <input
            type="text"
            class="form-control"
            id="inputBuscador"
            placeholder="Buscar publicaciones..."
            autocomplete="off"
          >
          <button class="btn btn-outline-secondary" type="button" id="btnLimpiar" style="display: none;">
            <i class="bi bi-x-lg buscar"></i>
          </button>
        </div>
      </div>
    </div>

    <section id="feedPublicaciones" class="feed-publicaciones"></section>

  </div>

<script src="./js/feed-publicaciones.js"></script>
<script>
  // ── Animación del título ──
  animarTituloGlobal('#titulo-noticias', 'Últimas Publicaciones');

  // ── Buscador ──
  (function() {
    const inputBuscador = document.getElementById('inputBuscador');
    const btnLimpiar    = document.getElementById('btnLimpiar');
    const iconSearch    = document.getElementById('lordIconSearch');

    if (!inputBuscador) return;

    let timeoutBusqueda = null;

    // El ícono de lupa también lanza la búsqueda al hacer clic
    if (iconSearch) {
      iconSearch.addEventListener('click', () => {
        const query = inputBuscador.value.trim();
        if (query.length > 0) window.buscarPublicaciones(query);
        else inputBuscador.focus();
      });
    }

    inputBuscador.addEventListener('input', function(e) {
      const query = e.target.value.trim();
      btnLimpiar.style.display = query.length > 0 ? 'block' : 'none';

      clearTimeout(timeoutBusqueda);
      timeoutBusqueda = setTimeout(() => {
        if (query.length > 0) window.buscarPublicaciones(query);
        else window.cargarPublicaciones();
      }, 500);
    });

    btnLimpiar.addEventListener('click', function() {
      inputBuscador.value = '';
      btnLimpiar.style.display = 'none';
      window.cargarPublicaciones();
    });

    inputBuscador.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        const query = e.target.value.trim();
        if (query.length > 0) window.buscarPublicaciones(query);
      }
    });
  })();
</script>
</body>
</html>
