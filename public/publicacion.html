<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar - AttoMusic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Lordicon: colores base (modo claro) ── */
    lord-icon {
      --lord-icon-primary: #ba01ff;
      --lord-icon-secondary: #00dffc;
    }
    /* ── Lordicon: colores modo oscuro ── */
    html[data-bs-theme="dark"] lord-icon {
      --lord-icon-primary: #d580ff;
      --lord-icon-secondary: #00dffc;
    }

    /* Ícono dentro del botón "Publicar": color blanco */
    #btnPublicar lord-icon {
      --lord-icon-primary: #ffffff;
      --lord-icon-secondary: #e0b3ff;
    }

    /* Botón de búsqueda con lord-icon: alinear ícono y texto */
    #buscarCancionBtn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* Input-group search: input-group-text como contenedor del ícono */
    .search-icon-wrap {
      display: flex;
      align-items: center;
      padding: 0 2px;
    }
  </style>
</head>
<body class="transition-bg">
  <main class="container content fade-in">

    <div class="news-header mb-5 fade-up-section text-center">
      <!-- Ícono de lápiz/edición animado -->
      <!-- 🔔 Si aparece vacío: busca "pencil" o "edit" en lordicon.com/icons/wired/gradient -->
      <lord-icon
        src="https://cdn.lordicon.com/pflsjpqd.json"
        trigger="loop"
        delay="1000"
        style="width:74px;height:74px;">
      </lord-icon>
      <h1 id="titulo-siguiendo" style="font-size: 60px;"></h1>
      <p class="text-muted">Comparte con los demás usuarios tus gustos musicales.</p>
    </div>

    <div id="mensajeError" class="alert alert-danger d-none" role="alert"></div>

    <form id="formPublicacion" class="publicacion-card p-4 rounded shadow">
      <div class="mb-3">
        <label for="textoPublicacion" class="form-label fw-semibold">¿Qué quieres compartir?</label>
        <textarea id="textoPublicacion" class="form-control textarea-pub" rows="3"
          placeholder="Comparte lo que estás escuchando..." required></textarea>
      </div>

      <div class="mb-3">
        <label for="busquedaCancion" class="form-label fw-semibold">Buscar canción</label>
        <div class="input-group" id="cancion-input-group">
          <!-- Ícono de lupa animado en el prefijo del input -->
          <!-- 🔔 Si aparece vacío: busca "magnifier" en lordicon.com/icons/wired/gradient -->
          <span class="input-group-text search-icon-wrap">
            <lord-icon
              src="https://cdn.lordicon.com/msoeawqm.json"
              trigger="hover"
              target="#cancion-input-group"
              style="width:28px;height:28px;">
            </lord-icon>
          </span>
          <input type="text" id="busquedaCancion" class="form-control"
            placeholder="Ejemplo: Imagine Dragons - Believer">
          <button type="button" id="buscarCancion" class="btn btn-gradient" id="buscarCancionBtn">
            Buscar
          </button>
        </div>
      </div>

      <div id="resultadoCanciones" class="mt-3"></div>
      <input type="hidden" id="idCancionSeleccionada">

      <!-- Botón publicar con ícono de envío animado -->
      <!-- 🔔 Si aparece vacío: busca "send" o "paper plane" en lordicon.com/icons/wired/gradient -->
      <button type="submit" class="btn btn-gradient w-100 mt-3 d-inline-flex align-items-center justify-content-center gap-2" id="btnPublicar">
        <lord-icon
          src="https://cdn.lordicon.com/jgeruqwm.json"
          trigger="hover"
          target="#btnPublicar"
          style="width:28px;height:28px;">
        </lord-icon>
        Publicar
      </button>
    </form>

    <div id="mensajePub" class="text-center mt-3 fw-semibold"></div>
    
  </main>

  <!-- Lordicon player -->
  <script src="https://cdn.lordicon.com/lordicon.js"></script>
  <script src="./js/publicacion.js"></script>
  <script>animarTituloGlobal('#titulo-siguiendo', 'Crear Nueva Publicación');</script>
</body>
</html>
