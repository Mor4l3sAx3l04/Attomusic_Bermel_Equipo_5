<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artistas - AttoMusic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/canciones-artistas.css">
</head>
<body>

  <div class="container py-4" style="max-width: 680px;">

    <div class="ca-feed-header fade-in">
      <div class="ca-feed-header-icon"><i class="bi bi-music-note-beamed"></i></div>
      <h1 id="titulo-artistas"></h1>
      <p class="text-muted">Descubre el talento de los usuarios AttoPlus.</p>
    </div>

    <div id="ca-feed-container"></div>

    <div id="ca-spinner" class="ca-spinner" style="display:none;">
      <div class="spinner-border" style="color:#ba01ff;" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>

    <div id="ca-fin-feed" class="ca-fin-feed" style="display:none;">
      <i class="bi bi-check-circle"></i> Has visto todas las canciones
    </div>

  </div>

<script src="js/canciones-artistas.js"></script>
</body>
</html>
