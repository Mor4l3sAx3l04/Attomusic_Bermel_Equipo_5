<!-- public/buscador.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados de búsqueda - AttoMusic</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button id="backToTopBtn" title="Volver arriba" style="display:none;position:fixed;bottom:32px;right:32px;z-index:9999;background:linear-gradient(160deg,#ba01ff,#00dffc);color:white;border:none;border-radius:50%;width:52px;height:52px;box-shadow:0 2px 12px #0002;font-size:2rem;cursor:pointer;transition:opacity 0.3s;">
    <span style="display:inline-block;transform:translateY(-2px);">↑</span>
  </button>
  
  <div id="main-content">
    <div class="news-header mb-5 fade-up-section text-center">
      <h1 id="titulo-buscador" style="font-size: 70px;"></h1>
      <p class="text-muted">Aquí tienes el resultado de tu búsqueda.</p>
    </div>
    <h1 class="search-section-title text-center" id="songs" style="font-size: 40px;">Canciones</h1>
      <div id="results-tracks" class="search-results"></div>
    <h1 class="search-section-title text-center" id="artists" style="font-size: 40px;">Artistas</h1>
      <div id="results-artists" class="search-results"></div>
    <h1 class="search-section-title text-center" id="albums" style="font-size: 40px;">Álbumes</h1>
      <div id="results-albums" class="search-results"></div>
  </div>

  <script src="js/detalleCancion.js"></script>
  <script src="js/pages/buscador.js"></script>
</body>
</html>
